[tool.ruff]
# Target Python version
target-version = "py310"

# Exclude unneeded directories from formatting and linting
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist"
]

# Set maximum line length
line-length = 88

[tool.ruff.lint]
# Enable specific linter rules
# E/W: pycodestyle, F: Pyflakes, I: isort (import sorting), B: flake8-bugbear, UP: pyupgrade
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "UP"
]

# Ignore E402 (imports not at top of file, needed for sys.path hacks) and E501 (line too long)
ignore = [
    "E402",
    "E501"
]

[tool.ruff.format]
# Use double quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"
