<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KAMON v3 姓検索</title>

    <!-- ★ CSS の正しいパス（/ui_v3/） -->
    <link rel="stylesheet" href="/ui_v3/index_v3.css">
</head>
<body>
    <div class="container">
        <h1>KAMON v3 姓検索</h1>

        <div class="search-box">
            <input id="queryInput" type="text" placeholder="姓を入力（例：佐藤）">
            <button id="searchButton">検索</button>
        </div>

        <div id="status" class="status"></div>

        <ul id="results" class="results"></ul>

        <!-- RAG 説明表示領域 -->
        <div id="ragDescription" class="rag-description hidden"></div>
    </div>

    <!-- ★ JS の正しいパス（/ui_v3/） -->
    <script src="/ui_v3/index_v3.js"></script>
</body>
</html>
